  var fc=C.filter(function(c){return c.prom===user});

  for(var d=0;d<7;d++){
    var day=new Date(today);day.setDate(today.getDate()+d);
    var dayStr=DAYS[day.getDay()]+' '+day.getDate()+'/'+(day.getMonth()+1);
    var isToday=d===0;var dayActions=[];
    all.forEach(function(c){if(c.seq){c.seq.forEach(function(s){
      var parts=s.d.split(' ');if(parts.length>=2){
        var dm=parseInt(parts[0]);var mm={'ene':1,'feb':2,'mar':3,'abr':4,'may':5,'jun':6,'jul':7,'ago':8,'sep':9,'oct':10,'nov':11,'dic':12}[parts[1]];
        if(dm===day.getDate()&&mm===(day.getMonth()+1))dayActions.push({name:c.apodo,msg:s.m})
      }})}}); 
    var cm=cumpleMatch(all,day);if(cm)dayActions.push({name:'',msg:cm});
    calHTML+='<div class="cal-day '+(isToday?'today':'')+'"><div class="cal-day-title">'+dayStr+'</div>';
    if(dayActions.length===0)calHTML+='<div class="cal-empty">Sin acciones</div>';
    else dayActions.forEach(function(a){calHTML+='<div class="cal-item">'+(a.name?'<b>'+a.name+'</b>: ':'')+a.msg+'</div>'});
    calHTML+='</div>'}
  calHTML+='</div>';calEl.innerHTML=calHTML;

  var remEl=document.getElementById('reminders');var allNext=[];
  all.forEach(function(c){
    if(c.pp)allNext.push({id:c.id,idx:-1,date:'URGENTE',text:c.apodo+': '+c.pp,type:'warn'});
    if(c.frio)allNext.push({id:c.id,idx:-2,date:'REACTIVAR',text:c.apodo+': '+c.dias+' dias sin contacto',type:'cold'});
    if(c.seq&&c.seq[0])allNext.push({id:c.id,idx:0,date:c.seq[0].d,text:c.apodo+': '+c.seq[0].m,type:'seq'});
  });
  allNext.sort(function(a,b){return a.type==='warn'?-1:b.type==='warn'?1:0});
  remEl.innerHTML=allNext.length===0?'<div style="color:#3a3630;font-size:11px;font-style:italic;padding:8px">Sin acciones</div>':allNext.slice(0,6).map(function(r){
    var dk=r.id+'_'+r.idx;var isDone=doneActions[dk];
    var icon=r.type==='warn'?'&#9888; ':r.type==='cold'?'&#10052; ':'';
    return '<div class="remind"><div class="remind-left"><div class="remind-date">'+icon+r.date+'</div><div class="remind-text">'+r.text+'</div></div><button class="done-btn '+(isDone?'completed':'')+'" onclick="markDone(\''+r.id+'\','+r.idx+')">'+(isDone?'&#10003; Hecho':'Marcar hecho')+'</button></div>'}).join('');

  var bo=document.getElementById('board');bo.innerHTML='';
  ET.forEach(function(et){
    var cards=fc.filter(function(c){return c.etapa===et.k});
    var col=document.createElement('div');col.className='column '+et.c;
    col.innerHTML='<div class="col-h"><span class="col-t">'+et.l+'</span><span class="col-c">'+cards.length+'</span></div><div class="col-cards">'+(cards.length===0?'<div class="col-empty">Sin contactos</div>':cards.map(function(c){
      var senHTML=c.senales.map(function(s){var cl=s.toLowerCase().match(/activo|satisf|insatisf|cobra|refiere|presento/)?'et-v':s.toLowerCase().match(/poco|sin dato|mejor como/)?'et-a':s.toLowerCase().match(/no esta|tarda/)?'et-v':'et-a';return '<span class="etiq '+cl+'">'+s.substring(0,38)+'</span>'}).join('');
      return '<div class="card" onclick="showC(\''+c.id+'\')"><div class="card-name">'+c.apodo+'</div><div class="card-sub">'+c.name+'</div><div class="card-emp">'+c.empresa+' &middot; '+c.cargo+'</div>'+senHTML+(c.esCliente?'<span class="etiq et-c">CLIENTE</span>':'')+(c.pp?'<div class="card-warn">&#9888; '+c.pp+'</div>':'')+(c.frio?'<div class="card-cold">&#10052; Contacto frio</div>':'')+'<div class="card-foot"><span class="card-days '+(c.venc?'over':'')+'">Hace '+c.dias+'d'+(c.venc?' &#9888;':'')+'</span><span>'+(c.cumple&&c.cumple!=='Desconocido'?'&#127874; '+c.cumple:'')+'</span></div>'+(c.tel?waLink(c.tel,c.seq&&c.seq[0]?c.seq[0].m:''):'')+'</div>'}).join(''))+'</div>';
    bo.appendChild(col)});
}

function cumpleMatch(arr,d){var r=null;arr.forEach(function(c){if(c.cumple&&c.cumple!=='Desconocido'){var p=c.cumple.split(' ');var mm={'ene':1,'feb':2,'mar':3,'abr':4,'may':5,'jun':6,'jul':7,'ago':8,'sep':9,'oct':10,'nov':11,'dic':12};if(parseInt(p[0])===d.getDate()&&mm[p[1]]===(d.getMonth()+1))r='&#127874; Cumple de '+c.apodo}});return r}

function showC(id){
  var c=C.find(function(x){return x.id===id});if(!c)return;
  var h='<button class="modal-close" onclick="closeM()">&#10005;</button><h2>'+c.apodo+'</h2><p style="color:#7a7468">'+c.name+'<br>'+c.empresa+' &middot; '+c.cargo+'</p>';
  h+='<h3>Datos</h3><div class="dr"><span class="dl">Etapa:</span><span class="dv">'+c.etapa+'</span></div><div class="dr"><span class="dl">Cumpleanos:</span><span class="dv">'+c.cumple+'</span></div><div class="dr"><span class="dl">Ultimo contacto:</span><span class="dv">Hace '+c.dias+' dias</span></div>'+(c.esCliente?'<div class="dr"><span class="dl">Status:</span><span class="dv" style="color:#60a5fa">Cliente activo ByB</span></div>':'')+(c.pp?'<div class="dr"><span class="dl" style="color:#f87171">Pendiente:</span><span class="dv" style="color:#f87171">'+c.pp+'</span></div>':'');
  if(c.comoTratarlo)h+='<h3>Como tratar a esta persona</h3><div class="tip-box"><div class="tip-text">'+c.comoTratarlo+'</div></div>';
  h+='<h3>Senales</h3>'+c.senales.map(function(s){return '<p>'+s+'</p>'}).join('');
  h+='<h3>Proximos 5 pasos</h3>'+c.seq.map(function(s,i){var dk=c.id+'_'+i;var isDone=doneActions[dk];return '<div class="seq"><div class="seq-left"><div class="seq-d">Paso '+(i+1)+' - '+s.d+'</div><div class="seq-m">'+s.m+'</div></div><button class="done-btn '+(isDone?'completed':'')+'" onclick="markDone(\''+c.id+'\','+i+');showC(\''+c.id+'\');">'+(isDone?'&#10003;':'&#9744;')+'</button></div>'}).join('');
  if(c.tel)h+='<div style="margin-top:8px">'+waLink(c.tel,c.seq[0]?c.seq[0].m:'')+'</div>';
  if(c.guionLlamada)h+='<h3>Si necesitas llamar</h3><div class="tip-box"><div class="tip-title">Guion sugerido</div><div class="tip-text">'+c.guionLlamada+'</div></div>';
  if(c.regalo)h+='<h3>Sugerencia de regalo</h3><div class="tip-box"><div class="tip-title">Basado en sus intereses</div><div class="tip-text">'+c.regalo+'</div></div>';
  document.getElementById('modal').innerHTML=h;document.getElementById('overlay').classList.add('active');
}
function closeM(){document.getElementById('overlay').classList.remove('active')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM()});
initLogin();
</script>
</body></html>
