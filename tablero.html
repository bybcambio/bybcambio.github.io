var DAYS=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
var proms=[...new Set(C.map(function(c){return c.prom}))];
var user=null,activeFilter='all',doneActions={},activeTab='tablero';

function initLogin(){var b=document.getElementById('loginBtns');b.innerHTML=proms.map(function(p){return '<button class="login-btn" onclick="login(\''+p+'\')">'+p+'</button>'}).join('')}
function login(n){user=n;document.getElementById('loginScreen').classList.add('hidden');document.getElementById('app').classList.remove('hidden');render();renderProfiles()}
function logout(){user=null;document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('app').classList.add('hidden');document.getElementById('searchBox').value='';activeFilter='all';switchTab('tablero')}

function switchTab(t){activeTab=t;document.querySelectorAll('.tab').forEach(function(tb){tb.classList.toggle('active',tb.dataset.tab===t)});document.getElementById('tableroView').classList.toggle('hidden',t!=='tablero');document.getElementById('perfilesView').classList.toggle('hidden',t!=='perfiles');if(t==='perfiles')renderProfiles()}

function setFilter(f){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.f===f)});render()}
function markDone(id,idx){var k=id+'_'+idx;doneActions[k]=!doneActions[k];render()}
function getFiltered(){var fc=C.filter(function(c){return c.prom===user});var q=(document.getElementById('searchBox').value||'').toLowerCase();if(q)fc=fc.filter(function(c){return(c.name+c.apodo+c.empresa).toLowerCase().indexOf(q)>=0});if(activeFilter==='pending')fc=fc.filter(function(c){return c.pp});if(activeFilter==='overdue')fc=fc.filter(function(c){return c.venc});if(activeFilter==='client')fc=fc.filter(function(c){return c.esCliente});if(activeFilter==='cold')fc=fc.filter(function(c){return c.frio});return fc}
function waLink(tel,msg){if(!tel)return '';return '<a href="https://wa.me/52'+tel+'?text='+encodeURIComponent(msg||'')+'" target="_blank" class="wa-btn">&#128172; WhatsApp</a>'}
function scoreColor(s){return s>=80?'#c9956b':s>=60?'#4ade80':s>=40?'#fbbf24':s>=20?'#fb923c':'#f87171'}
function stageClass(e){return e==='Conocido nuevo'?'st-conocido':e==='En desarrollo'?'st-desarrollo':e==='Confianza'?'st-confianza':e==='Aliado'?'st-aliado':'st-socio'}
function initials(n){return n.split(' ').slice(0,2).map(function(w){return w[0]}).join('')}

function renderProfiles(){
  var fc=C.filter(function(c){return c.prom===user});
  var q=(document.getElementById('profileSearch')?document.getElementById('profileSearch').value:'').toLowerCase();
  if(q)fc=fc.filter(function(c){return(c.name+c.apodo+c.empresa+c.industria).toLowerCase().indexOf(q)>=0});
  var g=document.getElementById('profilesGrid');
  g.innerHTML=fc.map(function(c){
    var socials='';
    if(c.instagram)socials+='<a href="https://instagram.com/'+c.instagram.replace('@','')+'" target="_blank" class="social-link ig">IG</a>';
    if(c.linkedin)socials+='<a href="https://'+c.linkedin+'" target="_blank" class="social-link li">LinkedIn</a>';
    if(c.facebook)socials+='<a href="#" class="social-link fb">FB</a>';
    if(c.twitter)socials+='<a href="https://x.com/'+c.twitter.replace('@','')+'" target="_blank" class="social-link tw">X</a>';
    var meta='';
    if(c.bancoActual&&c.bancoActual!=='N/A (referenciadora)')meta+='<span class="meta-tag">Opera con: '+c.bancoActual+'</span>';
    if(c.volumen&&c.volumen!=='N/A')meta+='<span class="meta-tag">'+c.volumen+'</span>';
    if(c.pareja)meta+='<span class="meta-tag">Pareja: '+c.pareja+'</span>';
    if(c.hijos)meta+='<span class="meta-tag">Hijos: '+c.hijos+'</span>';
    return '<div class="profile-card" onclick="showProfile(\''+c.id+'\')"><div class="profile-top"><div class="profile-avatar">'+initials(c.name)+'</div><div class="profile-info"><div class="profile-name">'+c.apodo+' &mdash; '+c.name+'</div><div class="profile-role">'+c.empresa+' &middot; '+c.cargo+'</div><span class="profile-stage '+stageClass(c.etapa)+'">'+c.etapa+(c.esCliente?' &middot; CLIENTE':'')+'</span></div></div><div class="score-wrap"><div class="score-track"><div class="score-fill" style="width:'+c.score+'%;background:'+scoreColor(c.score)+'"></div></div><div class="score-label"><span>Score relacional</span><b style="color:'+scoreColor(c.score)+'">'+c.score+'/100</b></div></div>'+(socials?'<div class="social-links">'+socials+'</div>':'')+(meta?'<div class="profile-meta">'+meta+'</div>':'')+'</div>'}).join('');
}

function showProfile(id){
  var c=C.find(function(x){return x.id===id});if(!c)return;
  var h='<button class="modal-close" onclick="closeM()">&#10005;</button>';
  h+='<div style="display:flex;gap:12px;align-items:flex-start"><div class="profile-avatar" style="width:50px;height:50px;font-size:17px">'+initials(c.name)+'</div><div><h2>'+c.apodo+'</h2><p style="color:#7a7468;margin:0">'+c.name+'<br>'+c.empresa+' &middot; '+c.cargo+' &middot; '+c.zona+'</p></div></div>';

  // Score visual
  h+='<div class="score-wrap" style="margin:12px 0"><div class="score-track" style="height:8px"><div class="score-fill" style="width:'+c.score+'%;background:'+scoreColor(c.score)+'"></div></div><div class="score-label"><span>'+c.etapa+(c.esCliente?' &middot; Cliente activo ByB':'')+'</span><b style="color:'+scoreColor(c.score)+'">'+c.score+'/100</b></div></div>';

  // Datos generales
  h+='<h3>Datos</h3>';
  h+='<div class="dr"><span class="dl">Industria:</span><span class="dv">'+c.industria+'</span></div>';
  h+='<div class="dr"><span class="dl">Zona:</span><span class="dv">'+c.zona+'</span></div>';
  h+='<div class="dr"><span class="dl">Cumpleanos:</span><span class="dv">'+c.cumple+'</span></div>';
  h+='<div class="dr"><span class="dl">Ultimo contacto:</span><span class="dv">Hace '+c.dias+' dias</span></div>';
  h+='<div class="dr"><span class="dl">Telefono:</span><span class="dv">'+c.tel+'</span></div>';
  if(c.pp)h+='<div class="dr"><span class="dl" style="color:#f87171">Pendiente:</span><span class="dv" style="color:#f87171">'+c.pp+'</span></div>';

  // Redes sociales
  if(c.instagram||c.linkedin||c.facebook||c.twitter){
    h+='<h3>Redes sociales</h3><div class="social-links" style="margin:4px 0">';
    if(c.instagram)h+='<a href="https://instagram.com/'+c.instagram.replace('@','')+'" target="_blank" class="social-link ig">'+c.instagram+'</a>';
    if(c.linkedin)h+='<a href="https://'+c.linkedin+'" target="_blank" class="social-link li">LinkedIn</a>';
    if(c.facebook)h+='<a href="#" class="social-link fb">'+c.facebook+'</a>';
    if(c.twitter)h+='<a href="https://x.com/'+c.twitter.replace('@','')+'" target="_blank" class="social-link tw">'+c.twitter+'</a>';
    h+='</div>'}

  // Familia
  if(c.pareja||c.hijos){
    h+='<h3>Familia</h3>';
    if(c.pareja)h+='<div class="family-row"><span class="family-icon">&#10084;</span> <b>'+c.pareja+'</b>'+(c.cumplePareja?' &mdash; Cumple: '+c.cumplePareja:'')+'</div>';
    if(c.hijos)h+='<div class="family-row"><span class="family-icon">&#128118;</span> '+c.hijos+'</div>'}

  // Banco y volumen
  if(c.bancoActual&&c.bancoActual!=='N/A (referenciadora)'){
    h+='<h3>Informacion financiera</h3>';
    h+='<div class="dr"><span class="dl">Opera con:</span><span class="dv" style="color:#fbbf24">'+c.bancoActual+'</span></div>';
    h+='<div class="dr"><span class="dl">Volumen est.:</span><span class="dv" style="color:#c9956b">'+c.volumen+'</span></div>'}

  // Como tratarlo
  if(c.comoTratarlo)h+='<h3>Como tratar a esta persona</h3><div class="tip-box"><div class="tip-text">'+c.comoTratarlo+'</div></div>';

  // Senales
  h+='<h3>Senales detectadas</h3>'+c.senales.map(function(s){return '<p>'+s+'</p>'}).join('');

  // Historial de interacciones
  if(c.historial&&c.historial.length>0){
    h+='<h3>Historial de interacciones</h3><div class="timeline">';
    c.historial.forEach(function(hi){h+='<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-date">'+hi.fecha+' &mdash; '+hi.tipo+'</div><div class="tl-desc">'+hi.desc+'</div></div></div>'});
    h+='</div>'}

  // Conexiones cruzadas
  if(c.conexiones&&c.conexiones.length>0){
    h+='<h3>Conexiones cruzadas</h3>';
    c.conexiones.forEach(function(cn){h+='<div class="conn-item"><b style="color:#c9956b">'+cn.nombre+'</b><span class="conn-arrow">&#10231;</span><span style="color:#b0a89a">'+cn.razon+'</span></div>'})}

  // Proximos 5 pasos
  h+='<h3>Proximos 5 pasos</h3>'+c.seq.map(function(s,i){var dk=c.id+'_'+i;var isDone=doneActions[dk];return '<div class="seq"><div class="seq-left"><div class="seq-d">Paso '+(i+1)+' - '+s.d+'</div><div class="seq-m">'+s.m+'</div></div><button class="done-btn '+(isDone?'completed':'')+'" onclick="markDone(\''+c.id+'\','+i+');showProfile(\''+c.id+'\');">'+(isDone?'&#10003;':'&#9744;')+'</button></div>'}).join('');

  // WhatsApp
  if(c.tel)h+='<div style="margin-top:8px">'+waLink(c.tel,c.seq[0]?c.seq[0].m:'')+'</div>';

  // Guion de llamada
  if(c.guionLlamada)h+='<h3>Si necesitas llamar</h3><div class="tip-box"><div class="tip-title">Guion sugerido</div><div class="tip-text">'+c.guionLlamada+'</div></div>';

  // Regalo
  if(c.regalo)h+='<h3>Sugerencia de regalo</h3><div class="tip-box"><div class="tip-title">Basado en sus intereses</div><div class="tip-text">'+c.regalo+'</div></div>';

  document.getElementById('modal').innerHTML=h;document.getElementById('overlay').classList.add('active');
}
function render(){
  var all=C.filter(function(c){return c.prom===user});var fc=getFiltered();
  var pp=all.filter(function(c){return c.pp}).length;var frios=all.filter(function(c){return c.frio}).length;
  var clientes=all.filter(function(c){return c.esCliente}).length;var vencidos=all.filter(function(c){return c.venc}).length;
  document.getElementById('pCard').innerHTML='<div><div class="pname">'+user+'</div><div style="color:#7a7468;font-size:10px">'+all.length+' contactos en tu red</div></div><div class="pstats"><div class="ps"><div class="v">'+all.length+'</div><div class="l">Contactos</div></div><div class="ps ok"><div class="v">'+clientes+'</div><div class="l">Clientes</div></div><div class="ps '+(pp>0?'a':'')+'"><div class="v">'+pp+'</div><div class="l">Pendientes</div></div><div class="ps '+(vencidos>0?'a':'')+'"><div class="v">'+vencidos+'</div><div class="l">Vencidos</div></div><div class="ps '+(frios>0?'a':'')+'"><div class="v">'+frios+'</div><div class="l">Frios</div></div></div>';
  var doneCount=Object.keys(doneActions).filter(function(k){return doneActions[k]}).length;
  var totalSeqs=all.reduce(function(a,c){return a+c.seq.length},0);
  document.getElementById('progressBar').innerHTML='<h3>Progreso del mes</h3><div class="progress-row"><div class="progress-item"><b>'+all.length+'</b> contactos</div><div class="progress-item"><b>'+clientes+'</b> clientes</div><div class="progress-item"><b>'+doneCount+'</b>/'+totalSeqs+' acciones</div><div class="progress-item"><b>'+pp+'</b> promesas</div></div>';
  var calEl=document.getElementById('calendarSection');var today=new Date();var calHTML='<h3>Calendario de la semana</h3><div class="cal-grid">';
  for(var d=0;d<7;d++){var day=new Date(today);day.setDate(today.getDate()+d);var dayStr=DAYS[day.getDay()]+' '+day.getDate()+'/'+(day.getMonth()+1);var isToday=d===0;var dayActions=[];
  all.forEach(function(c){if(c.seq){c.seq.forEach(function(s){var parts=s.d.split(' ');if(parts.length>=2){var dm=parseInt(parts[0]);var mm={'ene':1,'feb':2,'mar':3,'abr':4,'may':5,'jun':6,'jul':7,'ago':8,'sep':9,'oct':10,'nov':11,'dic':12}[parts[1]];if(dm===day.getDate()&&mm===(day.getMonth()+1))dayActions.push({name:c.apodo,msg:s.m})}})}});
  calHTML+='<div class="cal-day '+(isToday?'today':'')+'"><div class="cal-day-title">'+dayStr+'</div>';
  if(dayActions.length===0)calHTML+='<div class="cal-empty">Sin acciones</div>';
  else dayActions.forEach(function(a){calHTML+='<div class="cal-item"><b>'+a.name+'</b>: '+a.msg+'</div>'});calHTML+='</div>'}
  calHTML+='</div>';calEl.innerHTML=calHTML;
  var remEl=document.getElementById('reminders');var allNext=[];
  all.forEach(function(c){if(c.pp)allNext.push({id:c.id,idx:-1,date:'URGENTE',text:c.apodo+': '+c.pp,type:'warn'});if(c.frio)allNext.push({id:c.id,idx:-2,date:'REACTIVAR',text:c.apodo+': '+c.dias+' dias sin contacto',type:'cold'});if(c.seq&&c.seq[0])allNext.push({id:c.id,idx:0,date:c.seq[0].d,text:c.apodo+': '+c.seq[0].m,type:'seq'})});
  allNext.sort(function(a,b){return a.type==='warn'?-1:b.type==='warn'?1:0});
  remEl.innerHTML=allNext.length===0?'<div style="color:#3a3630;font-size:11px;padding:8px">Sin acciones</div>':allNext.slice(0,6).map(function(r){var dk=r.id+'_'+r.idx;var isDone=doneActions[dk];var icon=r.type==='warn'?'&#9888; ':r.type==='cold'?'&#10052; ':'';return '<div class="remind"><div class="remind-left"><div class="remind-date">'+icon+r.date+'</div><div class="remind-text">'+r.text+'</div></div><button class="done-btn '+(isDone?'completed':'')+'" onclick="markDone(\''+r.id+'\','+r.idx+')">'+(isDone?'&#10003; Hecho':'Marcar hecho')+'</button></div>'}).join('');
  var bo=document.getElementById('board');bo.innerHTML='';
  ET.forEach(function(et){var cards=fc.filter(function(c){return c.etapa===et.k});var col=document.createElement('div');col.className='column '+et.c;
  col.innerHTML='<div class="col-h"><span class="col-t">'+et.l+'</span><span class="col-c">'+cards.length+'</span></div><div class="col-cards">'+(cards.length===0?'<div class="col-empty">Sin contactos</div>':cards.map(function(c){var senHTML=c.senales.map(function(s){var cl=s.toLowerCase().match(/activo|satisf|insatisf|cobra|refiere|presento/)?'et-v':s.toLowerCase().match(/poco|sin dato|mejor como/)?'et-a':'et-a';return '<span class="etiq '+cl+'">'+s.substring(0,35)+'</span>'}).join('');return '<div class="card" onclick="showProfile(\''+c.id+'\')"><div class="card-name">'+c.apodo+'</div><div class="card-sub">'+c.name+'</div><div class="card-emp">'+c.empresa+' &middot; '+c.cargo+'</div>'+senHTML+(c.esCliente?'<span class="etiq et-c">CLIENTE</span>':'')+(c.pp?'<div class="card-warn">&#9888; '+c.pp+'</div>':'')+(c.frio?'<div class="card-cold">&#10052; Contacto frio</div>':'')+'<div class="card-foot"><span class="card-days '+(c.venc?'over':'')+'">Hace '+c.dias+'d'+(c.venc?' &#9888;':'')+'</span><span>'+(c.cumple&&c.cumple!=='Desconocido'?'&#127874; '+c.cumple:'')+'</span></div>'+(c.tel?waLink(c.tel,c.seq&&c.seq[0]?c.seq[0].m:''):'')+'</div>'}).join(''))+'</div>';bo.appendChild(col)})}
function closeM(){document.getElementById('overlay').classList.remove('active')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM()});
initLogin();
</script>
