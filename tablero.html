<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f0d0a;font-family:'DM Sans',sans-serif;color:#e8e2d8;min-height:100vh;-webkit-overflow-scrolling:touch}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.filter-btn.active{border-color:#c9956b;background:#2d2820;color:#c9956b}
.section{padding:4px 16px 0}.section h2{font-size:10px;color:#c9956b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}

.board{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto}
.column{flex:0 0 200px;background:#14120f;border:1px solid #2a2722;border-radius:10px;display:flex;flex-direction:column;max-height:55vh}
.col-h{padding:8px 10px;border-bottom:1px solid #2a2722;display:flex;justify-content:space-between;align-items:center}
.col-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.col-c{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.col-cards{padding:5px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:5px}
.col-empty{padding:14px 8px;text-align:center;color:#3a3630;font-size:10px;font-style:italic}
.card{background:#1a1816;border:1px solid #2a2722;border-radius:8px;padding:8px;cursor:pointer;transition:all .2s}
.card:hover{border-color:#c9956b}
.card-name{font-size:11px;font-weight:700}.card-sub{font-size:8px;color:#7a7468}.card-emp{font-size:9px;color:#7a7468;margin:2px 0 3px}
.card-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #2a2722;padding-top:3px;margin-top:3px}

.card-warn{font-size:8px;color:#f87171;margin-bottom:2px}.card-cold{font-size:8px;color:#60a5fa;margin-bottom:2px}
.etiq{display:inline-block;padding:1px 5px;border-radius:3px;font-size:7px;font-weight:600;margin-right:2px;margin-bottom:2px}
.et-v{background:rgba(74,222,128,.15);color:#4ade80}.et-a{background:rgba(251,191,36,.15);color:#fbbf24}.et-r{background:rgba(248,113,113,.15);color:#f87171}.et-c{background:rgba(96,165,250,.15);color:#60a5fa}
.wa-btn{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:5px;background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.3);color:#25d366;font-size:8px;font-weight:600;cursor:pointer;text-decoration:none;margin-top:3px}
.remind{background:#1a1816;border:1px solid #2a2722;border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.remind-left{flex:1}.remind-date{font-size:9px;color:#c9956b;font-weight:700}.remind-text{font-size:10px;color:#b0a89a;margin-top:1px}
.done-btn{padding:4px 10px;border-radius:5px;border:1px solid #3a3630;background:#1a1816;color:#7a7468;font-size:9px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.done-btn:hover{border-color:#4ade80;color:#4ade80}.done-btn.completed{border-color:#4ade80;background:rgba(74,222,128,.15);color:#4ade80}
.profiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:0 16px 16px}
.profile-card{background:#1a1816;border:1px solid #2a2722;border-radius:10px;padding:14px;cursor:pointer;transition:all .2s}
.profile-card:hover{border-color:#c9956b}
.profile-top{display:flex;gap:10px;margin-bottom:8px}
.profile-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#c9956b,#a07040);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#14120f;flex-shrink:0}
.profile-name{font-size:13px;font-weight:700}.profile-role{font-size:10px;color:#7a7468;margin-top:1px}
.profile-stage{font-size:8px;padding:2px 8px;border-radius:4px;font-weight:600;display:inline-block;margin-top:4px}
.st-conocido{background:rgba(122,116,104,.2);color:#7a7468}.st-desarrollo{background:rgba(251,191,36,.15);color:#fbbf24}.st-confianza{background:rgba(96,165,250,.15);color:#60a5fa}.st-aliado{background:rgba(74,222,128,.15);color:#4ade80}.st-socio{background:rgba(201,149,107,.15);color:#c9956b}
.score-wrap{margin:6px 0}.score-track{height:6px;background:#2a2722;border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px}.score-label{display:flex;justify-content:space-between;margin-top:3px}
.score-label span{font-size:8px;color:#7a7468}.score-label b{font-size:10px}
.profile-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.meta-tag{font-size:8px;padding:2px 6px;border-radius:3px;background:#14120f;border:1px solid #2a2722;color:#b0a89a}
.social-links{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.social-link{padding:3px 8px;border-radius:4px;font-size:8px;font-weight:600;text-decoration:none;border:1px solid #2a2722;color:#7a7468}
.social-link.ig{color:#e1306c;border-color:rgba(225,48,108,.3)}.social-link.li{color:#0077b5;border-color:rgba(0,119,181,.3)}.social-link.fb{color:#1877f2;border-color:rgba(24,119,242,.3)}.social-link.tw{color:#1da1f2;border-color:rgba(29,161,242,.3)}
.cal-grid{display:flex;gap:6px;overflow-x:auto;padding:0 16px 8px}
.cal-day{flex:0 0 120px;background:#14120f;border:1px solid #2a2722;border-radius:8px;padding:8px}
.cal-day.today{border-color:#c9956b}
.cal-day-title{font-size:9px;font-weight:700;color:#7a7468;text-transform:uppercase;margin-bottom:4px}
.cal-day.today .cal-day-title{color:#c9956b}
.cal-item{font-size:8px;color:#b0a89a;padding:2px 0;border-bottom:1px solid #1e1c19;line-height:1.3}.cal-item:last-child{border:none}.cal-item b{color:#e8e2d8}
.cal-empty{font-size:8px;color:#3a3630;font-style:italic;padding:3px 0}
/* AGENDA */
.agenda-month{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 16px 16px}
.agenda-header{font-size:9px;font-weight:700;color:#7a7468;text-align:center;padding:6px 0;text-transform:uppercase}
.agenda-cell{background:#14120f;border:1px solid #2a2722;border-radius:6px;min-height:60px;padding:4px;font-size:8px}
.agenda-cell.today{border-color:#c9956b}
.agenda-cell.other{opacity:.3}
.agenda-num{font-size:10px;font-weight:700;color:#7a7468;margin-bottom:2px}
.agenda-cell.today .agenda-num{color:#c9956b}
.agenda-ev{padding:2px 4px;border-radius:3px;margin-bottom:2px;font-size:7px;line-height:1.2;cursor:pointer}
.agenda-ev.msg{background:rgba(96,165,250,.15);color:#60a5fa}
.agenda-ev.cumple{background:rgba(244,114,182,.15);color:#f472b6}
.agenda-ev.evento{background:rgba(74,222,128,.15);color:#4ade80}
.agenda-ev.promesa{background:rgba(248,113,113,.15);color:#f87171}
.agenda-nav{display:flex;justify-content:center;align-items:center;gap:16px;padding:8px 16px}
.agenda-nav button{background:#1a1816;border:1px solid #2a2722;border-radius:6px;color:#7a7468;padding:6px 14px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.agenda-nav span{font-size:13px;font-weight:700;color:#c9956b;min-width:160px;text-align:center}
/* MENSAJES */
.msg-list{padding:0 16px 16px}
.msg-group{margin-bottom:12px}
.msg-group-title{font-size:10px;color:#c9956b;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding:0 2px}
.msg-item{background:#1a1816;border:1px solid #2a2722;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.msg-content{flex:1}.msg-to{font-size:11px;font-weight:700;color:#e8e2d8}.msg-preview{font-size:10px;color:#b0a89a;font-style:italic;margin-top:2px;line-height:1.4}
.msg-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.msg-type{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600}
.msg-type.urgente{background:rgba(248,113,113,.15);color:#f87171}
.msg-type.normal{background:rgba(96,165,250,.15);color:#60a5fa}
.msg-type.reactivar{background:rgba(251,191,36,.15);color:#fbbf24}
/* METRICAS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:0 16px 12px}
.metric-card{background:#14120f;border:1px solid #2a2722;border-radius:8px;padding:12px;text-align:center}
.metric-card .val{font-size:24px;font-weight:700;color:#c9956b}.metric-card .lbl{font-size:8px;color:#7a7468;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.metric-card.green .val{color:#4ade80}.metric-card.red .val{color:#f87171}
.chart-section{padding:0 16px 16px}
.chart-card{background:#14120f;border:1px solid #2a2722;border-radius:10px;padding:14px;margin-bottom:10px}
.chart-card h3{font-size:10px;color:#c9956b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:8px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s}
.bar-label{font-size:8px;color:#7a7468;text-align:center}
.bar-val{font-size:9px;font-weight:700;color:#e8e2d8}
.pie-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.pie-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#b0a89a}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* EVENTOS */
.events-list{padding:0 16px 16px}
.event-card{background:#1a1816;border:1px solid #2a2722;border-radius:10px;padding:14px;margin-bottom:8px}
.event-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.event-name{font-size:14px;font-weight:700;color:#c9956b}
.event-date{font-size:10px;color:#7a7468}
.event-location{font-size:11px;color:#b0a89a;margin-bottom:8px}
.event-guests{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.event-guest{padding:3px 8px;border-radius:4px;font-size:9px;background:#14120f;border:1px solid #2a2722;color:#e8e2d8}
.event-checklist{border-top:1px solid #2a2722;padding-top:8px}
.check-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px;color:#b0a89a;cursor:pointer}
.check-box{width:14px;height:14px;border:1px solid #3a3630;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#4ade80;flex-shrink:0}
.check-box.checked{background:rgba(74,222,128,.15);border-color:#4ade80}
.event-obj{font-size:10px;color:#7a7468;font-style:italic;margin-bottom:6px}
/* MODAL */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center;padding:16px}
.overlay.active{display:flex}
.modal{background:#1a1816;border:1px solid #2a2722;border-radius:12px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;padding:18px}
.modal-close{float:right;background:none;border:none;color:#7a7468;font-size:16px;cursor:pointer}
.modal h2{font-size:15px;color:#c9956b;margin-bottom:3px}
.modal h3{font-size:10px;color:#c9956b;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;border-bottom:1px solid #2a2722;padding-bottom:3px}
.modal p{font-size:10px;color:#b0a89a;line-height:1.5;margin-bottom:3px}
.dr{display:flex;gap:6px;margin-bottom:2px}.dl{color:#7a7468;font-size:9px;width:110px;flex-shrink:0}.dv{color:#e8e2d8;font-size:9px}
.seq{background:#14120f;border:1px solid #2a2722;border-radius:6px;padding:8px;margin:4px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.seq-left{flex:1}.seq-d{font-size:9px;color:#c9956b;font-weight:700;margin-bottom:2px}.seq-m{font-size:10px;color:#b0a89a;font-style:italic;line-height:1.4}
.tip-box{background:#2d2820;border:1px solid #3a3630;border-radius:6px;padding:8px;margin:4px 0}
.tip-title{font-size:9px;color:#c9956b;font-weight:700;margin-bottom:3px}.tip-text{font-size:10px;color:#b0a89a;line-height:1.4}
.tl-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #2a2722}.tl-item:last-child{border:none}
.tl-dot{width:8px;height:8px;border-radius:50%;background:#c9956b;flex-shrink:0;margin-top:3px}
.tl-date{font-size:9px;color:#c9956b;font-weight:600}.tl-desc{font-size:10px;color:#b0a89a;margin-top:1px}
.conn-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px}.conn-arrow{color:#c9956b}
.family-row{display:flex;gap:4px;margin:3px 0;align-items:center;font-size:10px;color:#b0a89a}.family-icon{font-size:12px}
.col-conocido .col-t{color:#7a7468}.col-conocido .col-c{background:rgba(122,116,104,.2);color:#7a7468}
.col-desarrollo .col-t{color:#fbbf24}.col-desarrollo .col-c{background:rgba(251,191,36,.15);color:#fbbf24}
.col-confianza .col-t{color:#60a5fa}.col-confianza .col-c{background:rgba(96,165,250,.15);color:#60a5fa}
.col-aliado .col-t{color:#4ade80}.col-aliado .col-c{background:rgba(74,222,128,.15);color:#4ade80}
.col-socio .col-t{color:#c9956b}.col-socio .col-c{background:rgba(201,149,107,.15);color:#c9956b}
.hidden{display:none}
@media(max-width:600px){.pstats{gap:8px}.ps .v{font-size:14px}.profiles-grid{grid-template-columns:1fr}.agenda-month{grid-template-columns:repeat(7,1fr);gap:2px}.agenda-cell{min-height:45px}}
</style>
</head>
<body>
<div id="loginScreen" class="login"><div class="login-box">
<div class="login-icon">RP</div><h1>Mi Red de Contactos</h1>
<p>ByB Casa de Cambio â Selecciona tu nombre</p>

<div style="margin-top:32px;color:#5a5449;font-size:10px;letter-spacing:0.04em">Creado por <span style="color:#c9956b">Dimitri Haik</span> &mdash; AI Lead</div>
</div></div>
<div id="app" class="hidden">
<div class="header"><div class="header-inner"><div class="brand"><div class="brand-icon">RP</div><h1>Mi Red</h1></div><button class="logout" onclick="logout()">Cambiar</button></div></div>

  for(var d=0;d<7;d++){var day=new Date(today);day.setDate(today.getDate()+d);var ds=DAYS[day.getDay()]+' '+day.getDate()+'/'+(day.getMonth()+1),acts=[];
  a.forEach(c=>{c.seq.forEach(s=>{var p=s.d.split(' ');if(p.length>=2){var dm=parseInt(p[0]),mm={ene:1,feb:2,mar:3,abr:4,may:5,jun:6,jul:7,ago:8,sep:9,oct:10,nov:11,dic:12}[p[1]];if(dm===day.getDate()&&mm===(day.getMonth()+1))acts.push('<div class="cal-item"><b>'+c.apodo+'</b>: '+s.m+'</div>')}})});
  cH+='<div class="cal-day '+(d===0?'today':'')+'"><div class="cal-day-title">'+ds+'</div>'+(acts.length?acts.join(''):'<div class="cal-empty">Sin acciones</div>')+'</div>'}
  document.getElementById('calGrid').innerHTML=cH;
  var rEl=document.getElementById('reminders'),rA=[];
  a.forEach(c=>{if(c.pp)rA.push({id:c.id,idx:-1,date:'URGENTE',text:c.apodo+': '+c.pp,type:'warn'});if(c.frio)rA.push({id:c.id,idx:-2,date:'REACTIVAR',text:c.apodo+': '+c.dias+' dias',type:'cold'});if(c.seq[0])rA.push({id:c.id,idx:0,date:c.seq[0].d,text:c.apodo+': '+c.seq[0].m,type:'seq'})});
  rA.sort((a,b)=>a.type==='warn'?-1:b.type==='warn'?1:0);
  rEl.innerHTML=rA.length?rA.slice(0,6).map(r=>{var dk=r.id+'_'+r.idx,d=doneActions[dk],ic=r.type==='warn'?'&#9888; ':r.type==='cold'?'&#10052; ':'';return '<div class="remind"><div class="remind-left"><div class="remind-date">'+ic+r.date+'</div><div class="remind-text">'+r.text+'</div></div><button class="done-btn '+(d?'completed':'')+'" onclick="markDone(\''+r.id+'\','+r.idx+')">'+(d?'&#10003; Hecho':'Hecho')+'</button></div>'}).join(''):'<div style="color:#3a3630;font-size:11px;padding:8px">Sin acciones</div>';
  var bo=document.getElementById('board');bo.innerHTML='';
  ET.forEach(et=>{var cards=fc.filter(c=>c.etapa===et.k),col=document.createElement('div');col.className='column '+et.c;
  col.innerHTML='<div class="col-h"><span class="col-t">'+et.l+'</span><span class="col-c">'+cards.length+'</span></div><div class="col-cards">'+(cards.length?cards.map(c=>{var se=c.senales.map(s=>'<span class="etiq '+(s.match(/activo|satisf|refiere|presento/i)?'et-v':s.match(/poco|mejor como/i)?'et-a':'et-a')+'">'+s.substring(0,32)+'</span>').join('');return '<div class="card" onclick="showP(\''+c.id+'\')"><div class="card-name">'+c.apodo+'</div><div class="card-sub">'+c.name+'</div><div class="card-emp">'+c.empresa+'</div>'+se+(c.esCliente?'<span class="etiq et-c">CLIENTE</span>':'')+(c.pp?'<div class="card-warn">&#9888; '+c.pp+'</div>':'')+(c.frio?'<div class="card-cold">&#10052; Frio</div>':'')+'<div class="card-foot"><span class="card-days '+(c.venc?'over':'')+'">'+c.dias+'d'+(c.venc?' &#9888;':'')+'</span><span>'+(c.cumple&&c.cumple!=='Desconocido'?'&#127874;':'')+'</span></div>'+(c.tel?waLink(c.tel,c.seq[0]?c.seq[0].m:''):'')+'</div>'}).join(''):'<div class="col-empty">Vacio</div>')+'</div>';bo.appendChild(col)})}

function renderAgenda(){
  document.getElementById('agendaTitle').textContent=MONTHS[agendaMonth]+' '+agendaYear;
  var first=new Date(agendaYear,agendaMonth,1),last=new Date(agendaYear,agendaMonth+1,0),startDay=first.getDay(),days=last.getDate();
  var h=DAYS.map(d=>'<div class="agenda-header">'+d+'</div>').join('');
  var a=all(),today=new Date(),mm={ene:1,feb:2,mar:3,abr:4,may:5,jun:6,jul:7,ago:8,sep:9,oct:10,nov:11,dic:12};
  for(var i=0;i<startDay;i++)h+='<div class="agenda-cell other"><div class="agenda-num">&nbsp;</div></div>';
  for(var d=1;d<=days;d++){
    var isToday=d===today.getDate()&&agendaMonth===today.getMonth()&&agendaYear===today.getFullYear();
    var evts='';
    a.forEach(c=>{c.seq.forEach(s=>{var p=s.d.split(' ');if(p.length>=2&&parseInt(p[0])===d&&mm[p[1]]===(agendaMonth+1))evts+='<div class="agenda-ev msg" onclick="event.stopPropagation();showP(\''+c.id+'\')">'+c.apodo+'</div>'})});
    a.forEach(c=>{if(c.cumple&&c.cumple!=='Desconocido'){var p=c.cumple.split(' ');if(parseInt(p[0])===d&&mm[p[1]]===(agendaMonth+1))evts+='<div class="agenda-ev cumple">&#127874; '+c.apodo+'</div>'}});
    EVENTOS.forEach(ev=>{var p=ev.fecha.split(' ');if(parseInt(p[0])===d&&mm[p[1]]===(agendaMonth+1))evts+='<div class="agenda-ev evento">'+ev.nombre+'</div>'});
    a.forEach(c=>{if(c.pp){var m=c.pp.match(/(\d+)\s+(\w+)/);if(m&&parseInt(m[1])===d&&mm[m[2]]===(agendaMonth+1))evts+='<div class="agenda-ev promesa">&#9888; '+c.apodo+'</div>'}});
    h+='<div class="agenda-cell '+(isToday?'today':'')+'"><div class="agenda-num">'+d+'</div>'+evts+'</div>'}
  document.getElementById('agendaGrid').innerHTML=h}
function changeMonth(n){agendaMonth+=n;if(agendaMonth>11){agendaMonth=0;agendaYear++}if(agendaMonth<0){agendaMonth=11;agendaYear--}renderAgenda()}

function renderMensajes(){
  var a=all(),h='';
  var urgentes=a.filter(c=>c.pp);
  var frios=a.filter(c=>c.frio);
  var hoy=a.filter(c=>c.seq[0]&&!c.pp&&!c.frio);
  if(urgentes.length){h+='<div class="msg-group"><div class="msg-group-title">&#9888; Promesas por cumplir</div>';urgentes.forEach(c=>{h+='<div class="msg-item"><div class="msg-content"><div class="msg-to">'+c.apodo+' &mdash; '+c.empresa+'</div><div class="msg-preview">'+c.pp+'</div></div><div class="msg-actions"><span class="msg-type urgente">URGENTE</span>'+(c.tel?waLink(c.tel,c.seq[0]?c.seq[0].m:''):'')+'</div></div>'});h+='</div>'}
  if(frios.length){h+='<div class="msg-group"><div class="msg-group-title">&#10052; Contactos por reactivar</div>';frios.forEach(c=>{h+='<div class="msg-item"><div class="msg-content"><div class="msg-to">'+c.apodo+' &mdash; '+c.empresa+'</div><div class="msg-preview">'+c.seq[0].m+'</div></div><div class="msg-actions"><span class="msg-type reactivar">REACTIVAR</span>'+(c.tel?waLink(c.tel,c.seq[0].m):'')+'</div></div>'});h+='</div>'}
  if(hoy.length){h+='<div class="msg-group"><div class="msg-group-title">Mensajes de esta semana</div>';hoy.forEach(c=>{h+='<div class="msg-item"><div class="msg-content"><div class="msg-to">'+c.apodo+' &mdash; '+c.empresa+'</div><div class="msg-preview">'+c.seq[0].m+'</div></div><div class="msg-actions"><span class="msg-type normal">'+c.seq[0].d+'</span>'+(c.tel?waLink(c.tel,c.seq[0].m):'')+'</div></div>'});h+='</div>'}
  document.getElementById('msgList').innerHTML=h||'<div style="color:#3a3630;padding:20px;text-align:center">Sin mensajes pendientes</div>'}

function renderMetricas(){
  var a=all(),cl=a.filter(c=>c.esCliente).length,sc=a.length?Math.round(a.reduce((s,c)=>s+c.score,0)/a.length):0,dc=Object.keys(doneActions).filter(k=>doneActions[k]).length;
  var stages={};ET.forEach(e=>stages[e.l]=a.filter(c=>c.etapa===e.k).length);
  var maxS=Math.max(...Object.values(stages),1);
  document.getElementById('metricsGrid').innerHTML='<div class="metric-card"><div class="val">'+a.length+'</div><div class="lbl">Contactos</div></div><div class="metric-card green"><div class="val">'+cl+'</div><div class="lbl">Clientes activos</div></div><div class="metric-card"><div class="val">'+sc+'</div><div class="lbl">Score promedio</div></div><div class="metric-card red"><div class="val">'+a.filter(c=>c.pp).length+'</div><div class="lbl">Promesas pend.</div></div><div class="metric-card"><div class="val">'+dc+'</div><div class="lbl">Acciones hechas</div></div><div class="metric-card"><div class="val">'+a.filter(c=>c.frio).length+'</div><div class="lbl">Contactos frios</div></div>';
  var stColors={CONOCIDO:'#7a7468',DESARROLLO:'#fbbf24',CONFIANZA:'#60a5fa',ALIADO:'#4ade80',SOCIO:'#c9956b'};
  var ch='<div class="chart-card"><h3>Contactos por etapa</h3><div class="bar-chart">'+Object.keys(stages).map(k=>'<div class="bar-wrap"><div class="bar-val">'+stages[k]+'</div><div class="bar" style="height:'+Math.max(stages[k]/maxS*100,8)+'%;background:'+(stColors[k]||'#7a7468')+'"></div><div class="bar-label">'+k+'</div></div>').join('')+'</div></div>';
  ch+='<div class="chart-card"><h3>Scores de la red</h3><div style="display:flex;gap:6px;flex-wrap:wrap">'+a.map(c=>'<div style="text-align:center;padding:6px 10px"><div style="font-size:16px;font-weight:700;color:'+scoreColor(c.score)+'">'+c.score+'</div><div style="font-size:9px;color:#7a7468">'+c.apodo+'</div></div>').join('')+'</div></div>';
  ch+='<div class="chart-card"><h3>Referidos generados</h3><div style="display:flex;gap:10px;flex-wrap:wrap">'+a.filter(c=>c.senales.some(s=>s.match(/refier|presento/i))).map(c=>'<div style="padding:6px 10px;background:#14120f;border:1px solid #2a2722;border-radius:6px;font-size:10px"><b style="color:#4ade80">'+c.apodo+'</b><span style="color:#7a7468"> genera referidos</span></div>').join('')+'</div></div>';
  document.getElementById('chartSection').innerHTML=ch}

function renderEventos(){
  var h=EVENTOS.map((ev,ei)=>{
    var guests=ev.invitados.map(g=>'<span class="event-guest">'+g+'</span>').join('');
    var checks=ev.checklist.map((ch,ci)=>{var ck=eventChecks[ei+'_'+ci];return '<div class="check-item" onclick="toggleCheck('+ei+','+ci+')"><div class="check-box '+(ck?'checked':'')+'">'+(ck?'&#10003;':'')+'</div>'+ch+'</div>'}).join('');
    return '<div class="event-card"><div class="event-header"><div class="event-name">'+ev.nombre+'</div><div class="event-date">'+ev.fecha+'</div></div><div class="event-location">'+ev.lugar+'</div><div class="event-obj">'+ev.objetivo+'</div><div class="event-guests">'+guests+'</div>'+(ev.notas?'<div style="font-size:9px;color:#c9956b;margin-bottom:6px">'+ev.notas+'</div>':'')+'<div class="event-checklist">'+checks+'</div></div>'}).join('');
  document.getElementById('eventsList').innerHTML=h||'<div style="color:#3a3630;padding:20px;text-align:center">Sin eventos programados</div>'}

function closeM(){document.getElementById('overlay').classList.remove('active')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});
initLogin();
</script></body></html>
